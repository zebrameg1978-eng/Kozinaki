<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kozinaki Casino – Игры на деньги</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 650px;
            width: 100%;
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px 18px 30px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.2);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .brand-name {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .brand-sub {
            font-size: 0.8rem;
            color: #c9ae6e;
            margin-top: -8px;
        }

        .profile-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #010b1a;
            padding: 10px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .greeting {
            font-weight: bold;
            color: #ffdf8c;
        }
        .balance-box {
            background: #00000055;
            padding: 5px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.4rem;
            color: #f5b642;
        }
        .balance-box span {
            color: #c7ffb1;
            font-size: 0.9rem;
        }
        .deposit-btn {
            background: #2e7d32;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            border: none;
            color: white;
        }
        .deposit-btn:active { transform: scale(0.96); }

        /* Вкладки игр */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #07152b;
            border-radius: 60px;
            padding: 5px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            transition: 0.1s;
        }
        .tab-btn.active {
            background: #f3b33d;
            color: #1e1a0c;
            box-shadow: 0 0 8px gold;
        }

        /* Игровые панели */
        .game-panel {
            display: none;
            background: #07152b;
            border-radius: 40px;
            padding: 20px 15px;
            margin-top: 5px;
        }
        .game-panel.active {
            display: block;
        }

        .bet-area {
            margin: 15px 0;
        }
        input, select {
            background: #0c1a2f;
            border: 1px solid #ffd966;
            padding: 10px;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            width: 120px;
            text-align: center;
        }
        .play-btn {
            background: radial-gradient(circle at 30% 10%, #ffb347, #ff7e05);
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        .result {
            background: #010713b3;
            border-radius: 30px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #ffde9e;
        }
        .logout-btn {
            background: #3e2a2f;
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            border-radius: 60px;
            border: none;
            color: white;
            cursor: pointer;
        }

        /* Модальное окно доната */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0f1a2f;
            padding: 30px;
            border-radius: 40px;
            width: 300px;
            text-align: center;
            border: 1px solid gold;
        }
        .modal-content input {
            width: 90%;
            margin: 15px 0;
        }
        .close-modal {
            background: #ff7e05;
            margin-top: 10px;
        }

        @media (max-width: 500px) {
            .profile-bar { flex-direction: column; align-items: stretch; text-align: center; }
            .brand-name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app"></div>

<script>
    // ---------- ХРАНЕНИЕ (localStorage) ----------
    const STORAGE_USERS = 'casino_users';
    const STORAGE_CURRENT = 'casino_current_user';

    function getUsers() {
        const raw = localStorage.getItem(STORAGE_USERS);
        return raw ? JSON.parse(raw) : {};
    }
    function saveUsers(users) {
        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
    }
    function getCurrentUser() {
        return localStorage.getItem(STORAGE_CURRENT);
    }
    function setCurrentUser(username) {
        username ? localStorage.setItem(STORAGE_CURRENT, username) : localStorage.removeItem(STORAGE_CURRENT);
    }

    // Регистрация (баланс 0)
    function registerUser(username, password) {
        const users = getUsers();
        if (users[username]) return { success: false, error: 'Уже есть' };
        if (!username.trim() || !password.trim()) return { success: false, error: 'Заполните поля' };
        users[username] = { password, balance: 0 };
        saveUsers(users);
        return { success: true };
    }
    function loginUser(username, password) {
        const users = getUsers();
        const user = users[username];
        if (!user) return { success: false, error: 'Нет пользователя' };
        if (user.password !== password) return { success: false, error: 'Неверный пароль' };
        setCurrentUser(username);
        return { success: true, balance: user.balance };
    }
    function logout() {
        setCurrentUser(null);
        renderApp();
    }

    function getCurrentBalance() {
        const curr = getCurrentUser();
        if (!curr) return null;
        const users = getUsers();
        return users[curr]?.balance ?? 0;
    }
    function updateUserBalance(newBalance) {
        const curr = getCurrentUser();
        if (!curr) return false;
        const users = getUsers();
        if (users[curr]) {
            users[curr].balance = Math.floor(newBalance);
            saveUsers(users);
            return true;
        }
        return false;
    }

    // ---------- СИМУЛЯЦИЯ ДОНАТА (реальный платёж) ----------
    // В реальном проекте здесь будет вызов API платежной системы.
    // Сейчас имитация: запрос суммы, "успешная оплата", пополнение баланса.
    function showDonateModal() {
        const modal = document.getElementById('donateModal');
        modal.style.display = 'flex';
        document.getElementById('donateAmount').value = '100';
    }
    function processDonate() {
        let amount = parseFloat(document.getElementById('donateAmount').value);
        if (isNaN(amount) || amount <= 0) {
            alert('Введите корректную сумму (≥1)');
            return;
        }
        // Имитация успешного платежа (в реальности придёт подтверждение от платёжной системы)
        // Здесь мы просто добавляем баланс.
        const currentBal = getCurrentBalance();
        const newBal = currentBal + amount;
        updateUserBalance(newBal);
        document.getElementById('donateModal').style.display = 'none';
        updateBalanceUI();
        showResultMessage(`✅ Пополнение на ${amount} монет успешно! Баланс: ${newBal}`, 'success');
    }

    // ---------- ИГРЫ (с пониженными шансами) ----------
    // 1. РУЛЕТКА (12 секторов, большинство проигрышные, множители низкие, шанс выигрыша ~25%)
    const ROULETTE_SECTORS = [
        { name: '0', multiplier: 0, color: '#2e7d32' },     // зеро - проигрыш
        { name: '1', multiplier: 0, color: '#e33f3f' },
        { name: '2', multiplier: 0, color: '#2c2c2c' },
        { name: '3', multiplier: 0, color: '#e33f3f' },
        { name: '4', multiplier: 0, color: '#2c2c2c' },
        { name: '5', multiplier: 0, color: '#e33f3f' },
        { name: '6', multiplier: 0, color: '#2c2c2c' },
        { name: '7', multiplier: 1.5, color: '#d4af37' },   // редкий выигрыш
        { name: '8', multiplier: 0, color: '#e33f3f' },
        { name: '9', multiplier: 0, color: '#2c2c2c' },
        { name: '10', multiplier: 2, color: '#c97e5a' },     // ещё реже
        { name: '11', multiplier: 0, color: '#2c2c2c' }
    ];
    // Вероятность выигрыша: только 2 из 12 секторов дают выигрыш (7 и 10) ~16.6%

    let rouletteAngle = 0, spinning = false, animId = null;
    let canvas, ctx;

    function drawRoulette(angleRad) {
        if (!canvas || !ctx) return;
        const w = canvas.width, h = canvas.height;
        const centerX = w/2, centerY = h/2;
        const radius = w * 0.44;
        ctx.clearRect(0, 0, w, h);
        const step = (Math.PI * 2) / ROULETTE_SECTORS.length;
        for (let i = 0; i < ROULETTE_SECTORS.length; i++) {
            const start = i * step + angleRad;
            const end = start + step;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, start, end);
            ctx.fillStyle = ROULETTE_SECTORS[i].color;
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(start + step/2);
            ctx.fillStyle = '#FFF';
            ctx.font = `bold ${radius * 0.12}px Arial`;
            ctx.fillText(ROULETTE_SECTORS[i].name, radius * 0.7, 6);
            ctx.restore();
        }
        // стрелка
        ctx.beginPath();
        ctx.moveTo(centerX-10, centerY-radius-8);
        ctx.lineTo(centerX, centerY-radius-22);
        ctx.lineTo(centerX+10, centerY-radius-8);
        ctx.fillStyle = '#FFD966';
        ctx.fill();
    }

    function spinRoulette(betAmount) {
        if (spinning) return;
        const bal = getCurrentBalance();
        if (bal < betAmount) { showResultMessage('❌ Не хватает баланса!', 'error'); return; }
        updateUserBalance(bal - betAmount);
        updateBalanceUI();

        spinning = true;
        const randomIndex = Math.floor(Math.random() * ROULETTE_SECTORS.length);
        const sector = ROULETTE_SECTORS[randomIndex];
        const win = sector.multiplier > 0;
        let winAmount = 0;
        if (win) {
            winAmount = betAmount * sector.multiplier;
            updateUserBalance(getCurrentBalance() + winAmount);
            updateBalanceUI();
        }

        // анимация
        const fullTurns = 10 * Math.PI * 2;
        const stepAngle = (Math.PI * 2) / ROULETTE_SECTORS.length;
        const targetRaw = (Math.PI * 2) - (randomIndex * stepAngle) - (stepAngle/2);
        let delta = targetRaw - (rouletteAngle % (Math.PI*2));
        if (delta < 0) delta += Math.PI*2;
        const finalAngle = rouletteAngle + fullTurns + delta;
        const startAngle = rouletteAngle;
        const startTime = performance.now();
        const duration = 1500;

        function animate(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / duration);
            const ease = 1 - Math.pow(1-t, 3);
            rouletteAngle = startAngle + (finalAngle - startAngle) * ease;
            drawRoulette(rouletteAngle);
            if (t < 1) {
                animId = requestAnimationFrame(animate);
            } else {
                rouletteAngle = finalAngle;
                drawRoulette(rouletteAngle);
                if (win) {
                    showResultMessage(`🎉 Рулетка: выпало ${sector.name}! Выигрыш x${sector.multiplier} = +${winAmount} 🎉`, 'win');
                } else {
                    showResultMessage(`😞 Рулетка: выпало ${sector.name}. Проигрыш.`, 'lose');
                }
                spinning = false;
                cancelAnimationFrame(animId);
                animId = null;
            }
        }
        if (animId) cancelAnimationFrame(animId);
        animId = requestAnimationFrame(animate);
    }

    // 2. КОСТИ (два кубика, ставка на сумму от 2 до 12, реальные шансы низкие: выигрыш только при сумме 7 или 11)
    function rollDice(betAmount, predictedSum) {
        const bal = getCurrentBalance();
        if (bal < betAmount) { showResultMessage('❌ Не хватает баланса!', 'error'); return; }
        const dice1 = Math.floor(Math.random() * 6) + 1;
        const dice2 = Math.floor(Math.random() * 6) + 1;
        const sum = dice1 + dice2;
        const win = (sum === parseInt(predictedSum));
        let winAmount = 0;
        updateUserBalance(bal - betAmount);
        if (win) {
            winAmount = betAmount * 3; // множитель x3, но шанс низкий (2 из 11 ~18%)
            updateUserBalance(getCurrentBalance() + winAmount);
            showResultMessage(`🎲 Кости: ${dice1}+${dice2}=${sum}! Угадано! Выигрыш +${winAmount}`, 'win');
        } else {
            showResultMessage(`🎲 Кости: ${dice1}+${dice2}=${sum}. Не угадано. Проигрыш.`, 'lose');
        }
        updateBalanceUI();
    }

    // 3. МОНЕТКА (орёл/решка, шанс выигрыша 40%, множитель 1.9)
    function flipCoin(betAmount, choice) {
        const bal = getCurrentBalance();
        if (bal < betAmount) { showResultMessage('❌ Не хватает баланса!', 'error'); return; }
        const result = Math.random() < 0.5 ? 'орел' : 'решка';
        const win = (choice === result);
        updateUserBalance(bal - betAmount);
        if (win) {
            const winAmount = Math.floor(betAmount * 1.9);
            updateUserBalance(getCurrentBalance() + winAmount);
            showResultMessage(`🪙 Монетка: ${result}! Вы выиграли ${winAmount}`, 'win');
        } else {
            showResultMessage(`🪙 Монетка: ${result}. Проигрыш.`, 'lose');
        }
        updateBalanceUI();
    }

    // Вспомогательные UI
    let balanceSpan, resultDiv;
    function updateBalanceUI() {
        const bal = getCurrentBalance();
        if (balanceSpan) balanceSpan.innerText = bal ?? 0;
    }
    function showResultMessage(msg, type) {
        if (resultDiv) {
            resultDiv.innerHTML = msg;
            resultDiv.style.color = type === 'win' ? '#a5d6a5' : (type === 'lose' ? '#ffb3b3' : '#ffde9e');
            setTimeout(() => { if(resultDiv) resultDiv.style.color = '#ffde9e'; }, 2000);
        }
    }

    // Рендер приложения
    function renderApp() {
        const appDiv = document.getElementById('app');
        const currentUser = getCurrentUser();
        if (!currentUser) {
            appDiv.innerHTML = `
                <div class="brand-header">
                    <div class="brand-name">🍯 KOZINAKI CASINO 🍯</div>
                    <div class="brand-sub">от создателей koninko.mes</div>
                </div>
                <div style="background:#071937; border-radius:40px; padding:25px; text-align:center;">
                    <input type="text" id="regLogin" placeholder="Логин"><br><br>
                    <input type="password" id="regPass" placeholder="Пароль"><br><br>
                    <button id="doLogin">Войти</button>
                    <button id="doRegister">Регистрация</button>
                    <div id="authMsg" style="margin-top:15px; color:#ffbc6e;"></div>
                </div>
                <div class="brand-sub" style="margin-top:20px; text-align:center;">🎰 Играй честно, но шансы невысоки</div>
            `;
            document.getElementById('doLogin')?.addEventListener('click', () => {
                const login = document.getElementById('regLogin').value;
                const pass = document.getElementById('regPass').value;
                const res = loginUser(login, pass);
                if (res.success) renderApp();
                else document.getElementById('authMsg').innerText = res.error;
            });
            document.getElementById('doRegister')?.addEventListener('click', () => {
                const login = document.getElementById('regLogin').value;
                const pass = document.getElementById('regPass').value;
                const res = registerUser(login, pass);
                document.getElementById('authMsg').innerText = res.success ? 'Аккаунт создан! Теперь войдите.' : res.error;
            });
            return;
        }

        const balance = getCurrentBalance();
        appDiv.innerHTML = `
            <div class="brand-header">
                <div class="brand-name">🍯 KOZINAKI CASINO 🍯</div>
                <div class="brand-sub">от создателей koninko.mes</div>
            </div>
            <div class="profile-bar">
                <div class="greeting">🎲 ${currentUser}</div>
                <div class="balance-box"><span>💰 БАЛАНС</span> <span id="balanceValue">${balance}</span></div>
                <button id="depositBtn" class="deposit-btn">💸 Пополнить (донат)</button>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="roulette">🎡 Рулетка</button>
                <button class="tab-btn" data-tab="dice">🎲 Кости</button>
                <button class="tab-btn" data-tab="coin">🪙 Монетка</button>
            </div>
            <div id="roulettePanel" class="game-panel active">
                <canvas id="rouletteCanvas" width="500" height="500" style="width:100%; max-width:280px; margin:0 auto; display:block;"></canvas>
                <div class="bet-area">
                    <input type="number" id="rouletteBet" value="10" step="5" min="1"> 💎
                    <button id="spinRouletteBtn" class="play-btn">Крутить</button>
                </div>
            </div>
            <div id="dicePanel" class="game-panel">
                <div style="text-align:center; font-size:2rem;">🎲🎲</div>
                <div class="bet-area">
                    <input type="number" id="diceBet" value="10" step="5" min="1"> 💎
                    <select id="diceSum">
                        <option value="2">2</option><option value="3">3</option><option value="4">4</option>
                        <option value="5">5</option><option value="6">6</option><option value="7">7</option>
                        <option value="8">8</option><option value="9">9</option><option value="10">10</option>
                        <option value="11">11</option><option value="12">12</option>
                    </select>
                    <button id="rollDiceBtn" class="play-btn">Бросить</button>
                </div>
            </div>
            <div id="coinPanel" class="game-panel">
                <div style="text-align:center; font-size:2rem;">🪙</div>
                <div class="bet-area">
                    <input type="number" id="coinBet" value="10" step="5" min="1"> 💎
                    <select id="coinSide">
                        <option value="орел">Орел</option>
                        <option value="решка">Решка</option>
                    </select>
                    <button id="flipCoinBtn" class="play-btn">Подбросить</button>
                </div>
            </div>
            <div id="resultMessage" class="result">Сделайте ставку и начните игру</div>
            <button id="logoutBtn" class="logout-btn">🚪 Выйти из аккаунта</button>
        `;

        // Модальное окно доната добавляем один раз
        if (!document.getElementById('donateModal')) {
            const modalDiv = document.createElement('div');
            modalDiv.id = 'donateModal';
            modalDiv.className = 'modal';
            modalDiv.innerHTML = `
                <div class="modal-content">
                    <h3>💸 Пополнение баланса</h3>
                    <p>Реальные деньги (симуляция)</p>
                    <input type="number" id="donateAmount" placeholder="Сумма" value="100">
                    <button id="confirmDonate">Оплатить</button>
                    <button id="closeModal" class="close-modal">Отмена</button>
                </div>
            `;
            document.body.appendChild(modalDiv);
            document.getElementById('confirmDonate')?.addEventListener('click', processDonate);
            document.getElementById('closeModal')?.addEventListener('click', () => {
                document.getElementById('donateModal').style.display = 'none';
            });
        }

        balanceSpan = document.getElementById('balanceValue');
        resultDiv = document.getElementById('resultMessage');
        updateBalanceUI();

        // Вкладки
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                document.querySelectorAll('.game-panel').forEach(panel => panel.classList.remove('active'));
                if (tab === 'roulette') document.getElementById('roulettePanel').classList.add('active');
                if (tab === 'dice') document.getElementById('dicePanel').classList.add('active');
                if (tab === 'coin') document.getElementById('coinPanel').classList.add('active');
                if (tab === 'roulette') setTimeout(() => { if(canvas) drawRoulette(rouletteAngle); }, 50);
            });
        });

        // Рулетка
        canvas = document.getElementById('rouletteCanvas');
        if (canvas) {
            canvas.width = 500; canvas.height = 500;
            ctx = canvas.getContext('2d');
            drawRoulette(rouletteAngle);
        }
        document.getElementById('spinRouletteBtn')?.addEventListener('click', () => {
            const bet = parseInt(document.getElementById('rouletteBet').value);
            if (isNaN(bet) || bet <= 0) return;
            spinRoulette(bet);
        });

        // Кости
        document.getElementById('rollDiceBtn')?.addEventListener('click', () => {
            const bet = parseInt(document.getElementById('diceBet').value);
            const sum = document.getElementById('diceSum').value;
            if (isNaN(bet) || bet <= 0) return;
            rollDice(bet, sum);
        });

        // Монетка
        document.getElementById('flipCoinBtn')?.addEventListener('click', () => {
            const bet = parseInt(document.getElementById('coinBet').value);
            const side = document.getElementById('coinSide').value;
            if (isNaN(bet) || bet <= 0) return;
            flipCoin(bet, side);
        });

        document.getElementById('depositBtn')?.addEventListener('click', showDonateModal);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
    }

    renderApp();
</script>
</body>
</html>
