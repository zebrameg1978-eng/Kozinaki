<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kozinaki Roulette</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 550px;
            width: 100%;
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px 18px 30px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.2);
            transition: all 0.2s;
        }

        .profile-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #010b1a;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 30px;
            box-shadow: inset 0 1px 3px #00000030, 0 5px 10px rgba(0,0,0,0.2);
        }

        .greeting {
            font-weight: bold;
            font-size: 1.2rem;
            color: #ffdf8c;
            text-shadow: 0 1px 2px black;
        }

        .balance-box {
            background: #00000055;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.4rem;
            color: #f5b642;
            letter-spacing: 1px;
        }

        .balance-box span {
            color: #c7ffb1;
            font-size: 0.9rem;
            margin-right: 6px;
        }

        .roulette-wrapper {
            background: #031024;
            border-radius: 60px;
            padding: 15px 10px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 12px #00000055, 0 8px 18px black;
        }

        .wheel-area {
            position: relative;
            display: flex;
            justify-content: center;
        }

        canvas {
            background: #0a1428;
            border-radius: 50%;
            box-shadow: 0 0 0 8px #2a2e3f, 0 0 0 12px #101520, 0 15px 35px black;
            width: 100%;
            max-width: 300px;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }
        canvas:active { transform: scale(0.98); }

        .bet-panel {
            background: #07152b;
            border-radius: 40px;
            padding: 18px 15px;
            margin: 10px 0 20px;
        }

        .bet-amounts {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .bet-btn {
            background: #1f2a44;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 18px;
            border-radius: 60px;
            color: #e9f1ff;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 2px 5px black;
        }
        .bet-btn.active {
            background: #f3b33d;
            color: #1e1a0c;
            box-shadow: 0 0 12px gold;
        }

        .spin-btn {
            background: radial-gradient(circle at 30% 10%, #ffb347, #ff7e05);
            width: 80%;
            padding: 14px;
            font-size: 1.5rem;
            font-weight: bold;
